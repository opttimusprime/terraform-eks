architecture: replicaset
replicaCount: 3

auth:
  enabled: true
  rootUser: root
  rootPassword: "RootPassword123"
  replicaSetKey: "ReplicaSetKey123456"

replicaSetName: rs0

arbiter:
  enabled: false

persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi

service:
  type: ClusterIP
  ports:
    mongodb: 27017

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi