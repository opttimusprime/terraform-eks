replicaCount: 3

replicaSetName: rs0

namespace: {{ .Values.namespace }}

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

auth:
  rootUsername: root
  rootPassword: "RootPassword123"
  replicaSetKey: "ReplicaSetKey123456"

persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi
  accessModes:
    - ReadWriteOnce

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

initScript:
  configMapName: mongodb-init-script
  fileName: mongo-init.js