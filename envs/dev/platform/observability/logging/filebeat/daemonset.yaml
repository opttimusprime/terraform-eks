apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: logging

spec:
  selector:
    matchLabels:
      app: filebeat

  template:
    metadata:
      labels:
        app: filebeat

    spec:
      serviceAccountName: filebeat

      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.18.0

        volumeMounts:
        - name: config
          mountPath: /usr/share/filebeat/filebeat.yml
          subPath: filebeat.yml

        - name: varlog
          mountPath: /var/log

      volumes:
      - name: config
        configMap:
          name: filebeat-config

      - name: varlog
        hostPath:
          path: /var/log